<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f0f0f"/>
  <!-- Dot grid -->
  <defs>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.06"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo pill -->
  <rect x="548" y="200" width="104" height="40" rx="10" fill="#6366f1" opacity="0.15"/>
  <rect x="548" y="200" width="104" height="40" rx="10" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <text x="600" y="225" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="18" fill="#818cf8">AllFix</text>

  <!-- Headline -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="64" fill="#ffffff">Every Tool You Need,</text>
  <text x="600" y="386" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="64" fill="#818cf8">One Place.</text>

  <!-- Subline -->
  <text x="600" y="446" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="24" fill="#71717a">Free developer utilities — all running in your browser.</text>

  <!-- Bottom badge -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="500" font-size="18" fill="#3f3f46">allfix.dev</text>
</svg>
